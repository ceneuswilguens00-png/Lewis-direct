<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lewis Direct AI</title>
    <style>
        body { margin: 0; background: #000; text-align: center; color: white; font-family: Arial, sans-serif; }
        #video { width: 100%; max-width: 800px; display: block; margin: 0 auto; background: #000; }
        .contenedor-inferior { margin-top: 20px; padding: 20px; }
        
        /* Estilo del botón */
        .boton { background: #28a745; color: white; padding: 18px 35px; text-decoration: none; font-size: 22px; border-radius: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; border: none; }
        
        /* Estilo de tu imagen */
        .imagen-ia { width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #fff; }
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <video id="video" controls autoplay></video>
    <script>
        var video = document.getElementById('video');
        
         var videoSrc = 'https://dai.google.com/linear/h...c684afc/bandwidth/5208016.m3u8';
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>

    <div class="contenedor-inferior">
        <a href="https://www.effectivecpmnetwork.com/ph1zzjchc?key=3173d87fd8d8ff76ee41be2b04b497ac" class="boton">¡ENTRAR AL CANAL EN VIVO!</a>
        <br>
        <img src="Foto.jpeg" class="imagen-ia" alt="Lewis Direct AI">
    </div>

</body>
</html>
